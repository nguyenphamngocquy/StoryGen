pretrained_model_path: "stable-diffusion-v1-5/stable-diffusion-v1-5"
logdir: "./COCO_log/"
dataset_path: "./COCO2017/"
validation_sample_logger:
    num_inference_steps: 15
    guidance_scale: 5
gradient_accumulation_steps: 4
train_batch_size: 6
train_steps: 3000
validation_steps: 150
checkpointing_steps: 3000
seed: 6666
mixed_precision: 'fp16'
learning_rate: 4e-5
scale_lr: false
lr_scheduler: cosine
lr_warmup_steps: 200
use_8bit_adam: true
adam_beta1: 0.9
adam_beta2: 0.999
adam_weight_decay: 0.01
adam_epsilon: 1.0e-08
max_grad_norm: 1.0